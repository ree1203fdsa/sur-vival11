<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 환율 계산기</title>
    <style>
        :root { --p: #10b981; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; }
        .box { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 30px; font-weight: 900; font-size: 1.8rem; text-align: center; color: var(--p); }
        .row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; outline: none; font-size: 1.5rem; font-weight: 800; }
        .currency { width: 80px; font-weight: 900; font-size: 1.2rem; }
        .rate-info { text-align: center; font-size: 0.8rem; color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>💱 환율 계산기</h1>
        <div class="row">
            <div class="input-group">
                <input type="number" id="v1" value="1" oninput="calc()">
                <div class="currency">USD 🇺🇸</div>
            </div>
        </div>
        <div style="text-align:center; font-size:1.5rem; margin:10px 0;">⇅</div>
        <div class="row">
            <div class="input-group">
                <input type="number" id="v2" readonly>
                <div class="currency">KRW 🇰🇷</div>
            </div>
        </div>
        <div class="rate-info">실시간 환율 기준: 1 USD = 1,385.42 KRW<br>(최종 업데이트: 2026-04-21 18:20)</div>
    </div>

    <script>
        function calc() {
            const v1 = parseFloat(document.getElementById('v1').value || 0);
            const v2 = document.getElementById('v2');
            v2.value = (v1 * 1385.42).toFixed(2);
        }
        calc();
    </script>
</body>
</html>
