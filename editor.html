<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
    body { background: #0b0f19; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
    .toolbar { background: #1e293b; padding: 10px; display: flex; gap: 10px; border-bottom: 2px solid #334155; }
    button { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button:hover { background: #2563eb; }
    .editor-container { flex: 1; padding: 20px; display: flex; }
    textarea { flex: 1; background: rgba(255,255,255,0.05); color: #f8fafc; border: 1px solid #334155; border-radius: 10px; padding: 20px; font-size: 1.1rem; line-height: 1.6; outline: none; resize: none; font-family: 'Courier New', Courier, monospace; }
    .status { background: #0f172a; padding: 5px 20px; font-size: 0.8rem; color: #94a3b8; display: flex; justify-content: space-between; }
</style>
</head>
<body>
    <div class="toolbar">
        <button onclick="document.getElementById('editor').select(); document.execCommand('copy'); alert('복사되었습니다.');">복사하기</button>
        <button onclick="document.getElementById('editor').value = ''; countChars();">모두 지우기</button>
        <button onclick="alert('가상 저장소에 문서를 임시 저장했습니다.')" style="background:#22c55e;">저장</button>
    </div>
    <div class="editor-container">
        <textarea id="editor" placeholder="여기에 텍스트를 입력하세요. 코딩, 일기, 간단한 메모 등 자유롭게 작성 가능합니다..." oninput="countChars()"></textarea>
    </div>
    <div class="status">
        <span id="char-count">문자: 0 | 단어: 0</span>
        <span>UTF-8 | 주람 에디터 v1.0</span>
    </div>
    <script>
        function countChars() {
            const text = document.getElementById('editor').value;
            const chars = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('char-count').innerText = `문자: ${chars} | 단어: ${words}`;
        }
    </script>
</body>
</html>
