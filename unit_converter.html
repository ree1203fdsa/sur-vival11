<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 단위 변환기</title>
    <style>
        :root { --p: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; }
        .converter-box { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 30px; font-weight: 900; font-size: 1.8rem; text-align: center; }
        .row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        label { font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .input-group { display: flex; gap: 10px; }
        input, select { flex: 1; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; outline: none; font-size: 1.1rem; }
        .swap-btn { align-self: center; margin: 10px 0; background: none; border: none; color: var(--p); font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="converter-box">
        <h1>📏 단위 변환기</h1>
        <div class="row">
            <label>변환 종류</label>
            <select id="type">
                <option value="length">길이 (Length)</option>
                <option value="weight">무게 (Weight)</option>
                <option value="area">넓이 (Area)</option>
                <option value="temp">온도 (Temperature)</option>
            </select>
        </div>
        
        <div class="row">
            <div class="input-group">
                <input type="number" id="v1" value="1" oninput="convert()">
                <select id="u1" onchange="convert()">
                    <option value="cm">cm</option>
                    <option value="m">m</option>
                    <option value="km">km</option>
                    <option value="inch">inch</option>
                </select>
            </div>
        </div>

        <button class="swap-btn">⇅</button>

        <div class="row">
            <div class="input-group">
                <input type="number" id="v2" readonly>
                <select id="u2" onchange="convert()">
                    <option value="cm">cm</option>
                    <option value="m" selected>m</option>
                    <option value="km">km</option>
                    <option value="inch">inch</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        function convert() {
            const v1 = parseFloat(document.getElementById('v1').value);
            const u1 = document.getElementById('u1').value;
            const u2 = document.getElementById('u2').value;
            const v2 = document.getElementById('v2');

            // Simplified cm-based conversion for length
            const factors = { cm: 1, m: 100, km: 100000, inch: 2.54 };
            const cmValue = v1 * factors[u1];
            const result = cmValue / factors[u2];
            
            v2.value = result.toFixed(4);
        }
        convert();
    </script>
</body>
</html>
