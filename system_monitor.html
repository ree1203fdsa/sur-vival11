<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 모니터</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.03);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 { font-size: 1.5rem; margin: 0; font-weight: 800; color: var(--primary); }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
        }

        .card-label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; }
        .card-value { font-size: 1.8rem; font-weight: 800; }
        .card-sub { font-size: 0.75rem; color: #64748b; margin-top: 5px; }

        .process-list {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .process-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .process-item:last-child { border-bottom: none; }
        .proc-name { font-weight: 600; font-size: 0.9rem; }
        .proc-status { font-size: 0.75rem; color: var(--success); }

        .kill-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 700;
        }

        .kill-btn:hover { background: var(--danger); color: #fff; }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 1s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>시스템 모니터</h1>
        <div class="status-badge">● 시스템 안정적</div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-label">저장 공간 사용량 (LocalStorage)</div>
            <div class="card-value" id="storage-val">0.02 MB</div>
            <div class="progress-bar"><div class="progress-fill" id="storage-bar" style="width: 1%;"></div></div>
            <div class="card-sub">총 할당량: 5.0 MB</div>
        </div>
        <div class="card">
            <div class="card-label">활성 프로세스</div>
            <div class="card-value" id="proc-count">0</div>
            <div class="card-sub">OS 하위 시스템 포함</div>
        </div>
        <div class="card">
            <div class="card-label">네트워크 지연 시간</div>
            <div class="card-value" id="ping-val">12ms</div>
            <div class="card-sub">Firebase 실시간 연결됨</div>
        </div>
    </div>

    <h2 style="font-size: 1rem; margin-bottom: 15px; color: #94a3b8;">실행 중인 프로세스 목록</h2>
    <div class="process-list" id="process-list">
        <!-- Processes will be listed here -->
    </div>

    <script>
        function updateStats() {
            // Storage calculation
            let total = 0;
            for (let i = 0; i < localStorage.length; i++) {
                total += (localStorage.getItem(localStorage.key(i)).length * 2);
            }
            const mb = (total / (1024 * 1024)).toFixed(2);
            document.getElementById('storage-val').textContent = mb + ' MB';
            document.getElementById('storage-bar').style.width = Math.min((mb / 5) * 100, 100) + '%';

            // Ping simulation
            const ping = Math.floor(Math.random() * 20) + 10;
            document.getElementById('ping-val').textContent = ping + 'ms';

            // Process list from parent OS
            if (window.parent && window.parent.app && window.parent.app.activeWindows) {
                const wins = Array.from(window.parent.app.activeWindows);
                const list = document.getElementById('process-list');
                const configs = window.parent.app.windowConfigs;
                
                document.getElementById('proc-count').textContent = wins.length;
                list.innerHTML = '';
                
                wins.forEach(pid => {
                    const cfg = configs[pid] || { title: pid, icon: '🖥️' };
                    const item = document.createElement('div');
                    item.className = 'process-item';
                    item.innerHTML = `
                        <div>
                            <span class="proc-name">${cfg.icon} ${cfg.title}</span>
                            <span class="proc-status"> - 실행 중</span>
                        </div>
                        <button class="kill-btn" onclick="kill('${pid}')">작업 종료</button>
                    `;
                    list.appendChild(item);
                });
            }
        }

        function kill(pid) {
            if (window.parent && window.parent.app && window.parent.app.closeWindow) {
                window.parent.app.closeWindow(pid);
                setTimeout(updateStats, 100);
            }
        }

        setInterval(updateStats, 2000);
        updateStats();
    </script>
</body>
</html>
