<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 퀵 셰어 (Quick Share)</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.05);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .radar { width: 150px; height: 150px; border-radius: 50%; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 30px; animation: pulse 2s infinite; }
        .radar::after { content: ''; width: 200%; height: 200%; border: 1px solid var(--primary); border-radius: 50%; position: absolute; animation: ripple 2s infinite; opacity: 0; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        @keyframes ripple { 0% { transform: scale(0.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 0; } }
        
        .user-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        .user-card { background: var(--card); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .share-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .share-btn:hover { background: #2563eb; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; width: 300px; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
    </style>
</head>
<body>
    <div class="radar">🚀</div>
    <h2 style="margin-bottom: 5px;">주렴 퀵 셰어</h2>
    <p style="color: #64748b; font-size: 0.8rem; margin-bottom: 30px;">주변 유저를 찾는 중...</p>

    <div class="user-list" id="user-list">
        <!-- Users will appear here -->
    </div>

    <div class="modal" id="share-modal">
        <div class="modal-content">
            <h3 id="target-name" style="margin: 0;"></h3>
            <label style="font-size: 0.7rem; color: #64748b;">공유할 내용 선택</label>
            <select id="share-type" style="padding: 10px; border-radius: 8px; background: #000; color: #fff; border: 1px solid #333;">
                <option value="msg">메시지 보내기</option>
                <option value="coin">코인 선물하기</option>
                <option value="dia">다이아 선물하기</option>
            </select>
            <input type="text" id="share-val" placeholder="내용 또는 금액 입력">
            <button class="share-btn" onclick="confirmShare()">전송하기</button>
            <button style="background:none; border:none; color:#64748b; font-size:0.8rem; cursor:pointer;" onclick="closeModal()">취소</button>
        </div>
    </div>

    <script>
        let selectedUser = null;
        
        function loadUsers() {
            if (!window.parent.db) return;
            window.parent.db.ref('users').once('value').then(snap => {
                const users = snap.val() || {};
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                
                Object.entries(users).forEach(([uid, u]) => {
                    if (uid === window.parent.STATE.currentUser.uid) return;
                    
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div class="user-info">
                            <div class="user-avatar">👤</div>
                            <div>
                                <div style="font-weight: bold;">${u.username}</div>
                                <div style="font-size: 0.7rem; color: #64748b;">근처에 있음</div>
                            </div>
                        </div>
                        <button class="share-btn" onclick="openShare('${uid}', '${u.username}')">공유</button>
                    `;
                    list.appendChild(card);
                });
            });
        }

        function openShare(uid, name) {
            selectedUser = { uid, name };
            document.getElementById('target-name').textContent = `${name}님에게 공유`;
            document.getElementById('share-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('share-modal').style.display = 'none';
        }

        function confirmShare() {
            const type = document.getElementById('share-type').value;
            const val = document.getElementById('share-val').value;
            if (!val) return alert("내용을 입력해주세요.");

            if (window.parent.db) {
                window.parent.db.ref(`users/${selectedUser.uid}/incoming_shares`).push({
                    from: window.parent.STATE.currentUser.username,
                    fromUid: window.parent.STATE.currentUser.uid,
                    type: type,
                    value: val,
                    timestamp: Date.now()
                }).then(() => {
                    alert(`${selectedUser.name}님에게 성공적으로 전송되었습니다!`);
                    closeModal();
                });
            }
        }

        setInterval(loadUsers, 5000);
        loadUsers();
    </script>
</body>
</html>
