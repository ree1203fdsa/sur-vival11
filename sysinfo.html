<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
    body { background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
    .card { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 400px; border: 1px solid #334155; }
    .logo { font-size: 4rem; text-align: center; margin-bottom: 20px; text-shadow: 0 0 20px rgba(59,130,246,0.6); }
    h1 { text-align: center; color: #f8fafc; font-size: 1.8rem; margin: 0 0 5px 0; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }
    .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #334155; }
    .info-row:last-child { border: none; padding-bottom: 0; }
    .label { color: #94a3b8; font-weight: bold; }
    .value { color: #cbd5e1; font-family: monospace; }
</style>
</head>
<body>
    <div class="card">
        <div class="logo">💠</div>
        <h1>JuRam OS</h1>
        <div class="subtitle">Ultimate Web-based Operating System</div>
        
        <div class="info-row"><span class="label">버전</span><span class="value">v3.0.1 (Stable)</span></div>
        <div class="info-row"><span class="label">빌드 번호</span><span class="value">BUILD_202604</span></div>
        <div class="info-row"><span class="label">프로세서 아키텍처</span><span class="value">AeroJS 64-bit</span></div>
        <div class="info-row"><span class="label">가상 할당 메모리</span><span class="value">4.00 GB (3.8 GB 사용 중)</span></div>
        <div class="info-row"><span class="label">보안 플랫폼</span><span class="value">JuRam Defender Pro</span></div>
        <div class="info-row"><span class="label">네트워크 상태</span><span class="value" style="color:#4ade80;">연결됨 (보안 통신)</span></div>
    </div>
</body>
</html>
