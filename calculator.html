<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 계산기</title>
    <style>
        body {
            background: #1e293b;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .calc {
            width: 320px;
            background: #0f172a;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .display {
            width: 100%;
            height: 60px;
            background: #334155;
            margin-bottom: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 1.5rem;
            font-weight: 800;
            overflow: hidden;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            height: 60px;
            border-radius: 10px;
            border: none;
            background: #475569;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #64748b; }
        .op { background: #3b82f6; }
        .eq { background: #10b981; grid-column: span 2; }
        .clr { background: #ef4444; }
    </style>
</head>
<body>
    <div class="calc">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clr" onclick="clr()">C</button>
            <button onclick="del()">←</button>
            <button class="op" onclick="op('/')">/</button>
            <button class="op" onclick="op('*')">×</button>
            <button onclick="num('7')">7</button>
            <button onclick="num('8')">8</button>
            <button onclick="num('9')">9</button>
            <button class="op" onclick="op('-')">-</button>
            <button onclick="num('4')">4</button>
            <button onclick="num('5')">5</button>
            <button onclick="num('6')">6</button>
            <button class="op" onclick="op('+')">+</button>
            <button onclick="num('1')">1</button>
            <button onclick="num('2')">2</button>
            <button onclick="num('3')">3</button>
            <button class="eq" onclick="calc()">=</button>
            <button onclick="num('0')">0</button>
            <button onclick="num('.')">.</button>
        </div>
    </div>
    <script>
        let cur = '0';
        const d = document.getElementById('display');
        function update() { d.textContent = cur; }
        function num(v) { if(cur === '0') cur = v; else cur += v; update(); }
        function op(o) { cur += o; update(); }
        function clr() { cur = '0'; update(); }
        function del() { cur = cur.slice(0, -1) || '0'; update(); }
        function calc() { try { cur = eval(cur).toString(); } catch(e) { cur = 'Error'; } update(); }
    </script>
</body>
</html>
