<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 뱀 게임</title>
    <style>
        :root { --p: #22c55e; --bg: #0f172a; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; }
        #game-board { background: #000; border: 4px solid #334155; border-radius: 12px; box-shadow: 0 0 50px rgba(34, 197, 94, 0.1); }
        .stats { margin-bottom: 20px; display: flex; gap: 40px; font-size: 1.5rem; font-weight: 900; }
        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn { padding: 12px 24px; border-radius: 12px; border: none; background: #334155; color: white; font-weight: 800; cursor: pointer; }
        .btn:hover { background: var(--p); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="stats">
        <div style="color: var(--p)">SCORE: <span id="score">0</span></div>
        <div style="color: #f59e0b">BEST: <span id="best">12,450</span></div>
    </div>
    
    <canvas id="game-board" width="400" height="400"></canvas>

    <div class="controls">
        <button class="btn" onclick="reset()">새 게임</button>
        <button class="btn" onclick="alert('방향키를 사용하여 뱀을 조작하세요!')">조작법</button>
    </div>

    <script>
        const canvas = document.getElementById("game-board");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let score = 0;
        let snake = [{x: 9 * box, y: 10 * box}];
        let food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
        let d;

        document.addEventListener("keydown", direction);
        function direction(event) {
            let key = event.keyCode;
            if(key == 37 && d != "RIGHT") d = "LEFT";
            else if(key == 38 && d != "DOWN") d = "UP";
            else if(key == 39 && d != "LEFT") d = "RIGHT";
            else if(key == 40 && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#22c55e" : "#16a34a";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "black";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }
            
            ctx.fillStyle = "#ef4444";
            ctx.fillRect(food.x, food.y, box, box);
            
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;
            
            if(d == "LEFT") snakeX -= box;
            if(d == "UP") snakeY -= box;
            if(d == "RIGHT") snakeX += box;
            if(d == "DOWN") snakeY += box;
            
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById('score').textContent = score;
                food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
            } else {
                snake.pop();
            }
            
            let newHead = {x: snakeX, y: snakeY};
            
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("GAME OVER!");
                location.reload();
            }
            
            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function reset() { location.reload(); }

        let game = setInterval(draw, 100);
    </script>
</body>
</html>
