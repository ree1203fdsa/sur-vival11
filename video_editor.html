<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 동영상 편집기</title>
    <style>
        :root { --p: #a855f7; --bg: #0f0f12; --card: #1a1a20; --text: #f1f1f1; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 12px 25px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .editor-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .preview-area { flex: 1; display: flex; background: #000; position: relative; }
        .preview-main { flex: 3; display: flex; align-items: center; justify-content: center; position: relative; border-right: 1px solid #222; }
        .assets-panel { flex: 1; background: #0a0a0a; padding: 20px; overflow-y: auto; }
        .timeline { height: 250px; background: #0a0a0a; border-top: 2px solid #222; display: flex; flex-direction: column; }
        .timeline-controls { padding: 10px 25px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #1a1a1a; }
        .timeline-box { flex: 1; position: relative; overflow-x: auto; background: repeating-linear-gradient(90deg, #111, #111 49px, #222 50px); }
        .playhead { position: absolute; top: 0; bottom: 0; width: 2px; background: #ff4757; z-index: 10; left: 150px; }
        .track { height: 60px; margin: 10px 0; background: rgba(168, 85, 247, 0.15); border-radius: 4px; display: flex; align-items: center; padding: 0 15px; position: relative; border: 1px solid rgba(168, 85, 247, 0.3); }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; background: var(--p); color: white; cursor: pointer; font-weight: 700; }
        .asset-card { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8rem; cursor: pointer; }
        .asset-card:hover { background: #222; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;"><span style="font-size:1.5rem">✂️</span> <h1 style="font-size:1rem; margin:0">JuRam Video Editor Pro</h1></div>
        <button class="btn" style="background:#22c55e" onclick="alert('렌더링 중... (0%)')">렌더링 및 내보내기</button>
    </div>

    <div class="editor-container">
        <div class="preview-area">
            <div class="preview-main">
                <div style="width: 80%; aspect-ratio: 16/9; background: #111; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: #555;">PREVIEW MONITOR</div>
                <div style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:15px;">
                    <button style="background:none; border:none; color:white; font-size:1.5rem">⏮</button>
                    <button style="background:none; border:none; color:white; font-size:2rem">▶</button>
                    <button style="background:none; border:none; color:white; font-size:1.5rem">⏭</button>
                </div>
            </div>
            <div class="assets-panel">
                <h3 style="font-size:0.8rem; color:#666; text-transform:uppercase; margin-bottom:15px">소스 레이어</h3>
                <div class="asset-card">🎞️ Main_Clip_Final.mp4</div>
                <div class="asset-card">🎵 Background_Music.mp3</div>
                <div class="asset-card">🖼️ Overlay_Logo.png</div>
                <button class="btn" style="width:100%; font-size:0.8rem; background:#333">+ 파일 가져오기</button>
            </div>
        </div>

        <div class="timeline">
            <div class="timeline-controls">
                <span style="font-size:0.9rem; font-weight:800">00:02:14:15</span>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="background:#333; padding:5px 10px; font-size:0.8rem">분할 (Split)</button>
                    <button class="btn" style="background:#333; padding:5px 10px; font-size:0.8rem">삭제</button>
                </div>
            </div>
            <div class="timeline-box">
                <div class="playhead" id="playhead"></div>
                <div style="padding: 10px 0;">
                    <div class="track" style="width: 1200px; left: 100px;">🎥 Video Track 1: Main_Clip.mp4</div>
                    <div class="track" style="width: 800px; left: 100px; background: rgba(34, 197, 94, 0.15); border-color: rgba(34, 197, 94, 0.3);">🎵 Audio Track 1: Music.mp3</div>
                    <div class="track" style="width: 300px; left: 400px; background: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.3);">🖼️ Overlay Track: Logo.png</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
