<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
    body { background: #0b0f19; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .player-card { background: linear-gradient(145deg, #1e293b, #0f172a); width: 350px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 2px rgba(255,255,255,0.1); padding: 30px; display: flex; flex-direction: column; align-items: center; }
    .cover { width: 220px; height: 220px; border-radius: 50%; background: url('https://picsum.photos/400/400?music') no-repeat center/cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: spin 10s linear infinite; animation-play-state: paused; margin-bottom: 30px; border: 5px solid #334155; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .title { font-size: 1.5rem; font-weight: 900; margin-bottom: 5px; color: #f8fafc; text-align: center; }
    .artist { color: #94a3b8; font-size: 1rem; margin-bottom: 30px; }
    .timeline { width: 100%; height: 6px; background: #334155; border-radius: 3px; position: relative; margin-bottom: 30px; cursor: pointer; }
    .progress { width: 30%; height: 100%; background: #3b82f6; border-radius: 3px; position: absolute; top:0; left:0; box-shadow: 0 0 10px #3b82f6; }
    .controls { display: flex; gap: 30px; align-items: center; }
    .btn { background: none; border: none; font-size: 2rem; color: #cbd5e1; cursor: pointer; transition: 0.2s; }
    .btn:hover { color: #3b82f6; transform: scale(1.1); }
    .play-btn { width: 60px; height: 60px; background: #3b82f6; color: white; border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(59,130,246,0.4); }
    .play-btn:hover { background: #2563eb; transform: scale(1.05); }
</style>
</head>
<body>
    <div class="player-card">
        <div class="cover" id="cover"></div>
        <div class="title">Survival OS Alpha</div>
        <div class="artist">JuRam Studio</div>
        <div class="timeline">
            <div class="progress"></div>
        </div>
        <div class="controls">
            <button class="btn" onclick="alert('이전 곡이 없습니다.')">⏮</button>
            <button class="btn play-btn" onclick="togglePlay()" id="play">▶</button>
            <button class="btn" onclick="alert('다음 곡을 재생하려면 네트워크에 연결하세요.')">⏭</button>
        </div>
    </div>
    <script>
        let isPlaying = false;
        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('play').innerText = isPlaying ? '⏸' : '▶';
            document.getElementById('cover').style.animationPlayState = isPlaying ? 'running' : 'paused';
        }
    </script>
</body>
</html>
