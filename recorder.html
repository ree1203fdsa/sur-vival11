<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 음성 녹음기</title>
    <style>
        :root { --p: #ef4444; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; }
        .viz { width: 100%; max-width: 500px; height: 150px; display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 40px; }
        .bar { width: 6px; height: 10px; background: var(--p); border-radius: 3px; transition: height 0.1s; }
        .timer { font-size: 4rem; font-weight: 900; margin-bottom: 40px; font-variant-numeric: tabular-nums; }
        .controls { display: flex; gap: 30px; align-items: center; }
        .btn-rec { width: 80px; height: 80px; border-radius: 50%; border: none; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-rec:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
        .inner-rec { width: 30px; height: 30px; background: var(--p); border-radius: 50%; transition: 0.3s; }
        .recording .inner-rec { width: 25px; height: 25px; border-radius: 4px; }
        .list { margin-top: 50px; width: 100%; max-width: 400px; }
        .item { background: var(--card); padding: 15px 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body id="body">
    <div class="viz" id="viz">
        <!-- Bars generated by JS -->
    </div>
    
    <div class="timer" id="timer">00:00:00</div>

    <div class="controls">
        <button style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">⏮</button>
        <button class="btn-rec" id="rec-btn" onclick="toggle()">
            <div class="inner-rec"></div>
        </button>
        <button style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">💾</button>
    </div>

    <div class="list">
        <div class="item">
            <span>녹음_001.wav</span>
            <span style="color:#64748b">2.4 MB</span>
        </div>
    </div>

    <script>
        let isRec = false;
        let sec = 0;
        let timerIv;
        const viz = document.getElementById('viz');
        
        for(let i=0; i<40; i++) {
            const b = document.createElement('div');
            b.className = 'bar';
            viz.appendChild(b);
        }

        function toggle() {
            isRec = !isRec;
            document.getElementById('body').classList.toggle('recording', isRec);
            if(isRec) {
                timerIv = setInterval(() => {
                    sec++;
                    updateTimer();
                    updateViz();
                }, 100);
            } else {
                clearInterval(timerIv);
            }
        }

        function updateTimer() {
            const h = Math.floor(sec / 36000).toString().padStart(2, '0');
            const m = Math.floor((sec % 36000) / 600).toString().padStart(2, '0');
            const s = Math.floor((sec % 600) / 10).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${h}:${m}:${s}`;
        }

        function updateViz() {
            document.querySelectorAll('.bar').forEach(b => {
                b.style.height = (Math.random() * 100 + 10) + 'px';
            });
        }
    </script>
</body>
</html>
