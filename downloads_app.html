<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 다운로드 관리자</title>
    <style>
        :root { --p: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .list { display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
        .item { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 12px; transition: 0.2s; }
        .item:hover { border-color: var(--p); }
        .row { display: flex; justify-content: space-between; align-items: center; }
        .info { display: flex; align-items: center; gap: 15px; }
        .icon { font-size: 1.5rem; }
        .name { font-weight: 700; font-size: 1rem; }
        .size { font-size: 0.8rem; color: #64748b; }
        .progress-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--p); transition: 0.3s; width: 0; box-shadow: 0 0 10px var(--p); }
        .status { font-size: 0.75rem; color: #94a3b8; }
        .btn { background: rgba(59, 130, 246, 0.1); color: var(--p); border: none; padding: 6px 12px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="font-size: 1.5rem; margin: 0; font-weight: 900;">📥 다운로드 관리</h1>
        <div style="font-size: 0.85rem; color: #64748b;">여유 공간: 124.5 GB</div>
    </div>
    
    <div class="list">
        <div class="item">
            <div class="row">
                <div class="info">
                    <span class="icon">📦</span>
                    <div>
                        <div class="name">JuRam_OS_Patch_v176.zip</div>
                        <div class="size">450 MB / 1.2 GB (8.5 MB/s)</div>
                    </div>
                </div>
                <button class="btn">일시정지</button>
            </div>
            <div class="progress-bg"><div class="progress-fill" style="width: 38%"></div></div>
            <div class="status">남은 시간: 약 2분 30초</div>
        </div>

        <div class="item" style="border-color: #10b981; background: rgba(16, 185, 129, 0.05);">
            <div class="row">
                <div class="info">
                    <span class="icon">🎞️</span>
                    <div>
                        <div class="name">Landscape_4K_Wallpaper.mp4</div>
                        <div class="size">85 MB (완료)</div>
                    </div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="color:#10b981; background: rgba(16, 185, 129, 0.1);">폴더 열기</button>
                    <button class="btn" style="color:#10b981; background: rgba(16, 185, 129, 0.1);">실행</button>
                </div>
            </div>
            <div class="progress-bg"><div class="progress-fill" style="width: 100%; background: #10b981; box-shadow: 0 0 10px #10b981;"></div></div>
        </div>
    </div>
</body>
</html>
