<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 3D 뷰어</title>
    <style>
        :root { --p: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .toolbar { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .viewport { flex: 1; background: radial-gradient(circle, #2d3748 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; position: relative; }
        .canvas-container { width: 100%; height: 100%; }
        .hud { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 12px; font-size: 0.8rem; color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .side-ctrl { position: absolute; top: 100px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .ctrl-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover { background: var(--p); border-color: var(--p); }
    </style>
</head>
<body>
    <div class="toolbar">
        <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-size: 1.5rem;">🧊</span>
            <h1 style="font-size: 1.1rem; margin: 0; font-weight: 800;">JuRam 3D Engine v2.0</h1>
        </div>
        <button style="padding:8px 16px; border-radius:8px; border:none; background:var(--p); color:white; font-weight:700; cursor:pointer;" onclick="alert('3D 모델 파일(.obj, .gltf)을 기다리는 중입니다.')">모델 불러오기</button>
    </div>

    <div class="viewport" id="viewport">
        <!-- 3D Content would be rendered via Three.js -->
        <div style="text-align: center;">
            <div style="font-size: 8rem; margin-bottom: 20px; animation: spin 10s linear infinite;">📦</div>
            <p style="font-size: 1.2rem; font-weight: 700; color: #60a5fa;">3D 모델 대기 중...</p>
            <p style="color: #475569; font-size: 0.9rem;">마우스로 회전하고 스크롤로 확대/축소하세요.</p>
        </div>

        <div class="side-ctrl">
            <div class="ctrl-btn" title="와이어프레임">🌐</div>
            <div class="ctrl-btn" title="조명 조절">💡</div>
            <div class="ctrl-btn" title="텍스처">🔳</div>
            <div class="ctrl-btn" title="캡처">📸</div>
        </div>

        <div class="hud">
            Vertices: 142,506 | Triangles: 284,102<br>
            FPS: 60.0 | Memory: 142MB
        </div>
    </div>

    <style>
        @keyframes spin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    </style>
</body>
</html>
