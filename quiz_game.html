<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 퀴즈 서바이벌</title>
    <style>
        :root { --p: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; }
        .quiz-container { width: 100%; max-width: 600px; background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: 800; font-size: 0.9rem; color: #64748b; }
        .question { font-size: 1.5rem; font-weight: 900; margin-bottom: 40px; line-height: 1.4; text-align: center; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; cursor: pointer; transition: 0.2s; text-align: center; font-weight: 700; }
        .option:hover { border-color: var(--p); background: rgba(245, 158, 11, 0.05); transform: translateY(-3px); }
        .option.correct { border-color: #10b981; background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .option.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .timer-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 40px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--p); width: 100%; transition: width 1s linear; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <span>QUESTION 5 / 10</span>
            <span style="color: var(--p)">SCORE: 1,200</span>
        </div>
        <div class="question">주람 OS의 핵심 보안 엔진은 어떤 언어로 작성되었을까요?</div>
        <div class="options">
            <div class="option" onclick="ans(this)">C++</div>
            <div class="option" onclick="ans(this)">Rust</div>
            <div class="option" onclick="ans(this)">JavaScript</div>
            <div class="option" onclick="ans(this)">Python</div>
        </div>
        <div class="timer-bar"><div class="timer-fill" id="pb"></div></div>
    </div>

    <script>
        function ans(el) {
            const isCorrect = el.textContent === 'Rust';
            el.className = `option ${isCorrect ? 'correct' : 'wrong'}`;
            if(isCorrect) alert('정답입니다! +200점');
            else alert('오답입니다. 정답은 Rust입니다.');
            setTimeout(() => location.reload(), 1500);
        }
        let p = 100;
        setInterval(() => {
            p -= 10;
            if(p < 0) p = 0;
            document.getElementById('pb').style.width = p + '%';
        }, 1000);
    </script>
</body>
</html>
