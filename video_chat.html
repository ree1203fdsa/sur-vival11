<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 화상 회의</title>
    <style>
        :root { --p: #10b981; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: #000; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; padding: 10px; background: #111; }
        .user-cam { background: #222; border-radius: 12px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .user-cam img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; backdrop-filter: blur(5px); }
        .controls { background: #111; padding: 20px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #222; }
        .btn-ctrl { width: 50px; height: 50px; border-radius: 50%; border: none; background: #222; color: white; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-ctrl:hover { background: #333; }
        .btn-ctrl.off { background: #ef4444; }
        .btn-end { background: #ef4444; width: 100px; border-radius: 25px; font-weight: 800; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="user-cam">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=600" alt="ME">
            <div class="user-name">나 (주람 마스터)</div>
        </div>
        <div class="user-cam">
            <div style="font-size: 4rem;">👤</div>
            <div class="user-name">게스트 1 (참가 대기 중)</div>
        </div>
        <div class="user-cam">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=600" alt="USER">
            <div class="user-name">Sarah Wilson</div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn-ctrl" onclick="this.classList.toggle('off')">🎤</button>
        <button class="btn-ctrl" onclick="this.classList.toggle('off')">📷</button>
        <button class="btn-ctrl">🖥️</button>
        <button class="btn-ctrl">💬</button>
        <button class="btn-ctrl btn-end" onclick="alert('회의를 종료합니다.')">종료</button>
    </div>
</body>
</html>
