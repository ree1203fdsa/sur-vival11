<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>동굴부대 Mobile - 3D Military Sim</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>
    <div id="app">
        <!-- Rotation Hint -->
        <div id="rotation-hint" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 20px;">🔄</div>
            <p style="font-size: 1.2rem;">원활한 작전 수행을 위해<br>핸드폰을 <b>가로로</b> 돌려주십시오.</p>
        </div>

        <!-- Siren Alarm Layer -->
        <div id="siren-overlay"></div>

        <!-- Auth Screen -->
        <div id="auth-screen" class="screen active">
            <h1 style="font-size: 3rem; margin-bottom: 20px; text-shadow: 0 0 20px var(--gold);">CAVE UNIT</h1>
            <div id="login-form" style="width: 80%; display: flex; flex-direction: column; gap: 15px;">
                <input type="text" id="login-id" placeholder="군번 (아이디)" style="padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white;">
                <input type="password" id="login-pw" placeholder="암호" style="padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white;">
                <button id="btn-login" style="width: 100%; padding: 20px;">작전 구역 진입</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-ui" class="screen" style="display: none;">
            <canvas id="game-canvas"></canvas>
            
            <div id="hud">
                <!-- Top HUD -->
                <div class="hud-top">
                    <div class="rank-badge">
                        <span id="hud-name" style="font-size: 0.9rem; margin-bottom: 2px; color: white;">홍길동 요원</span>
                        <span id="hud-rank" class="rank-name">이등병</span>
                        <span id="hud-branch" class="branch-name">육군</span>
                    </div>
                </div>

                <!-- Sliding Chat Panel -->
                <div id="chat-container">
                    <div style="background: var(--primary-color); padding: 15px; font-weight: bold; display: flex; justify-content: space-between;">
                        <span>📡 부대 무전기</span>
                        <span id="online-count">1 Online</span>
                    </div>
                    <div id="chat-messages"></div>
                    <div style="padding: 10px; background: rgba(0,0,0,0.5); display: flex; gap: 10px;">
                        <input type="text" id="chat-input" placeholder="메시지..." style="flex: 1; padding: 10px; background: transparent; border: 1px solid #444; color: white; border-radius: 5px;">
                        <button id="btn-send-chat" style="padding: 10px;">전송</button>
                    </div>
                </div>

                <!-- Action Controls -->
                <div class="mobile-action-grid">
                    <button id="btn-exam" style="background: var(--gold); color: black;">승급</button>
                    <button id="btn-training">훈련</button>
                    <button id="btn-salute">경례</button>
                    <button id="btn-ease">쉬어</button>
                    <button id="btn-fire" class="fire-btn">FIRE</button>
                </div>

                <!-- Joystick -->
                <div id="joystick-container">
                    <div id="joystick-knob"></div>
                </div>

                <!-- Open Chat Button (Hint) -->
                <div id="btn-open-chat" style="position: absolute; top: 50%; left: 0; width: 30px; height: 100px; background: var(--primary-color); border-radius: 0 10px 10px 0; display: flex; align-items: center; justify-content: center; pointer-events: auto;">
                    <span>▶</span>
                </div>
            </div>

            <!-- Admin Panel (Floating) -->
            <div id="admin-panel" class="admin-mobile" style="display: none;">
                <h3 style="text-align: center; color: var(--danger); margin-bottom: 10px;">🛡️ 통제실</h3>
                <input type="text" id="target-user" placeholder="대상 아이디" style="width: 100%; padding: 10px; margin-bottom: 5px;">
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <button id="btn-siren-toggle" style="flex: 1; font-size: 0.8rem; background: var(--danger);">🚨 사이렌</button>
                    <button id="btn-send-to-jail" style="flex: 1; font-size: 0.8rem; background: #333;">⚖️ 영창</button>
                </div>
                <div id="user-info-display" style="font-size: 0.7rem; color: #0f0; margin-top: 5px; border-bottom: 1px solid #444; padding-bottom: 5px;"></div>
                
                <!-- Live User List -->
                <p style="font-size: 0.8rem; font-weight: bold; margin: 10px 0 5px;">📋 실시간 전체 요원 명부</p>
                <div id="master-user-list" style="height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 5px; padding: 5px; font-size: 0.7rem;">
                    대원 목록을 불러오는 중...
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="military_simulator.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (FIREBASE_ENABLED) {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                auth = firebase.auth();
            }
            initAuth();

            // Sliding Chat Logic
            const chat = document.getElementById('chat-container');
            const chatBtn = document.getElementById('btn-open-chat');
            let chatOpen = false;

            chatBtn.onclick = () => {
                chatOpen = !chatOpen;
                chat.classList.toggle('open', chatOpen);
                chatBtn.innerHTML = chatOpen ? '<span>◀</span>' : '<span>▶</span>';
                chatBtn.style.left = chatOpen ? '80%' : '0';
            };
        });

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            const target = document.getElementById(id);
            if (target) {
                target.style.display = (id === 'game-ui') ? 'block' : 'flex';
                if (id === 'game-ui') {
                    initGame();
                    attemptLandscape();
                }
            }
        }

        function attemptLandscape() {
            // Force landscape if supported
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => {
                    console.log("Landscape lock failed, showing hint instead.");
                    checkOrientation();
                });
            } else {
                checkOrientation();
            }
        }

        function checkOrientation() {
            const hint = document.getElementById('rotation-hint');
            if (window.innerHeight > window.innerWidth) {
                hint.style.display = 'flex';
            } else {
                hint.style.display = 'none';
            }
        }

        window.addEventListener('resize', checkOrientation);
    </script>
</body>
</html>
