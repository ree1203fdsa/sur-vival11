<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 시스템 클리너</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 30px; }
        .hero { text-align: center; padding: 40px 0; border-bottom: 1px solid #1e293b; }
        .icon { font-size: 80px; margin-bottom: 20px; }
        .desc { color: #94a3b8; font-size: 1.1rem; }
        .btn { display: block; width: 250px; margin: 30px auto; padding: 15px; background: #ef4444; border: none; border-radius: 50px; color: #fff; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #b91c1c; transform: scale(1.05); }
        .stats { display: flex; justify-content: space-around; margin-top: 40px; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 800; color: #10b981; }
        .stat-label { font-size: 0.8rem; color: #64748b; margin-top: 5px; }

        /* Scanning Animation */
        #scanning { display: none; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="hero">
        <div class="icon">🧹</div>
        <h1>System Optimizer</h1>
        <p class="desc">불필요한 캐시와 임시 데이터를 정리하여 시스템 성능을 향상시킵니다.</p>
    </div>

    <div id="ready">
        <button class="btn" onclick="startClean()">🚀 시스템 최적화 시작</button>
    </div>

    <div id="scanning">
        <div class="loader"></div>
        <p style="text-align: center; color: #3b82f6; font-weight: bold;">임시 데이터 분석 및 소거 중...</p>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-val" id="cache-size">24.5MB</div>
            <div class="stat-label">분석된 캐시 데이터</div>
        </div>
        <div class="stat-item">
            <div class="stat-val">100%</div>
            <div class="stat-label">현재 OS 상태</div>
        </div>
    </div>

    <script>
        function startClean() {
            document.getElementById('ready').style.display = 'none';
            document.getElementById('scanning').style.display = 'block';
            
            setTimeout(() => {
                // 시뮬레이션: LocalStorage의 비핵심 데이터를 정리하는 시늉
                alert("최적화 완료! 24.5MB의 정크 데이터가 소멸되었습니다.\nOS 속도가 개선되었습니다.");
                document.getElementById('scanning').style.display = 'none';
                document.getElementById('ready').style.display = 'block';
                document.getElementById('cache-size').textContent = '0.0MB';
            }, 3000);
        }
    </script>
</body>
</html>
