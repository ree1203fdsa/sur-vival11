<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival 3D - 조합 가이드</title>
    <style>
        :root {
            --primary: #68f7b5;
            --bg: #121418;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #68f7b5, #4285F4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .recipe-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: rgba(104, 247, 181, 0.3);
        }

        .recipe-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .recipe-name {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .recipe-ingredients {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .recipe-ingredients li {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 5px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .recipe-ingredients li:last-child {
            border-bottom: none;
        }

        .ingredient-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ingredient-count {
            font-weight: 700;
            color: #fff;
        }

        .desc {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 15px;
            font-style: italic;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(104, 247, 181, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <h1>SURVIVAL 조합 가이드</h1>
        <p style="color: var(--text-dim); margin-top: 5px;">황무지에서 살아남기 위한 필수 지침서</p>
    </header>

    <div class="category-filter">
        <button class="filter-btn active" data-category="all">전체</button>
        <button class="filter-btn" data-category="tool">도구</button>
        <button class="filter-btn" data-category="weapon">무기</button>
        <button class="filter-btn" data-category="build">건축</button>
        <button class="filter-btn" data-category="etc">기타</button>
    </div>

    <div class="recipe-grid" id="recipe-grid">
        <!-- Recipes will be injected by JS -->
    </div>

    <script>
        const recipes = [
            {
                name: "돌 도끼",
                icon: "🪓",
                category: "tool",
                ingredients: [
                    { name: "🪨 돌", count: 3 },
                    { name: "🪵 나무", count: 2 }
                ],
                desc: "나무를 더 빨리 밸 수 있습니다."
            },
            {
                name: "돌 곡괭이",
                icon: "⛏️",
                category: "tool",
                ingredients: [
                    { name: "🪨 돌", count: 3 },
                    { name: "🪵 나무", count: 2 }
                ],
                desc: "철과 금광석을 캘 수 있습니다."
            },
            {
                name: "기본 칼",
                icon: "🗡️",
                category: "weapon",
                ingredients: [
                    { name: "🔩 철", count: 2 },
                    { name: "🪵 나무", count: 1 }
                ],
                desc: "야생 동물을 사냥할 때 유용합니다."
            },
            {
                name: "조합대",
                icon: "🛠️",
                category: "build",
                ingredients: [
                    { name: "🪵 나무", count: 10 }
                ],
                desc: "더 복잡한 아이템을 만들 수 있게 해줍니다."
            },
            {
                name: "철 화로",
                icon: "🔥",
                category: "build",
                ingredients: [
                    { name: "🪨 돌", count: 8 },
                    { name: "🔩 철", count: 2 }
                ],
                desc: "음식을 요리하거나 광석을 제련합니다."
            },
            {
                name: "황금 갑옷",
                icon: "🛡️",
                category: "etc",
                ingredients: [
                    { name: "✨ 금", count: 10 }
                ],
                desc: "매우 높은 방어력을 제공합니다."
            }
        ];

        const grid = document.getElementById('recipe-grid');
        const filters = document.querySelectorAll('.filter-btn');

        function renderRecipes(filter = 'all') {
            grid.innerHTML = '';
            const filtered = filter === 'all' ? recipes : recipes.filter(r => r.category === filter);

            filtered.forEach(r => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <div class="badge">${r.category}</div>
                    <div class="recipe-icon">${r.icon}</div>
                    <div class="recipe-name">${r.name}</div>
                    <ul class="recipe-ingredients">
                        ${r.ingredients.map(i => `
                            <li>
                                <span class="ingredient-name">${i.name}</span>
                                <span class="ingredient-count">${i.count}개</span>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="desc">${r.desc}</div>
                `;
                grid.appendChild(card);
            });
        }

        filters.forEach(btn => {
            btn.onclick = () => {
                filters.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderRecipes(btn.dataset.category);
            };
        });

        renderRecipes();
    </script>
</body>
</html>
