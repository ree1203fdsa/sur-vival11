<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주람 휴지통</title>
    <style>
        :root { --p: #94a3b8; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h1 { font-size: 1.5rem; margin: 0; font-weight: 900; color: var(--p); }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-size: 0.9rem; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn.danger { color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; overflow-y: auto; align-content: start; }
        .file-item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 15px; border-radius: 12px; transition: 0.2s; cursor: pointer; }
        .file-item:hover { background: rgba(255,255,255,0.05); }
        .icon { font-size: 2.5rem; }
        .name { font-size: 0.8rem; text-align: center; word-break: break-all; color: #cbd5e1; }
        .empty-state { grid-column: 1/-1; text-align: center; padding-top: 100px; color: #475569; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗑️ 주람 휴지통</h1>
        <div id="stats" style="font-size: 0.8rem; color: #64748b;">항목: 0개</div>
    </div>
    <div class="toolbar">
        <button class="btn" onclick="restoreAll()">모두 복원</button>
        <button class="btn danger" onclick="emptyBin()">휴지통 비우기</button>
    </div>
    <div class="grid" id="bin-grid">
        <!-- Deleted items -->
    </div>

    <script>
        let deleted = JSON.parse(localStorage.getItem('juram_recycle_bin') || '[]');

        function render() {
            const grid = document.getElementById('bin-grid');
            const stats = document.getElementById('stats');
            grid.innerHTML = '';
            
            if (deleted.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div style="font-size: 4rem; margin-bottom: 20px;">📂</div><p>휴지통이 비어 있습니다.</p></div>';
                stats.textContent = '항목: 0개';
                return;
            }

            deleted.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <div class="icon">${item.type === 'folder' ? '📁' : '📄'}</div>
                    <div class="name">${item.name}</div>
                `;
                div.onclick = () => {
                    if(confirm(`${item.name}을(를) 복원하시겠습니까?`)) {
                        restore(i);
                    }
                };
                grid.appendChild(div);
            });
            stats.textContent = `항목: ${deleted.length}개`;
            localStorage.setItem('juram_recycle_bin', JSON.stringify(deleted));
        }

        function restore(i) {
            alert(`${deleted[i].name}이(가) 원래 위치로 복원되었습니다.`);
            deleted.splice(i, 1);
            render();
        }

        function restoreAll() {
            if (deleted.length === 0) return;
            if (confirm('모든 항목을 복원하시겠습니까?')) {
                deleted = [];
                alert('모든 항목이 복원되었습니다.');
                render();
            }
        }

        function emptyBin() {
            if (deleted.length === 0) return;
            if (confirm('휴지통을 비우시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
                deleted = [];
                render();
                alert('휴지통을 비웠습니다.');
            }
        }

        // Mock initial data if empty for demo
        if (deleted.length === 0) {
            deleted = [
                { name: 'old_report.txt', type: 'file' },
                { name: 'tmp_images', type: 'folder' },
                { name: 'backup_v1.zip', type: 'file' }
            ];
        }

        render();
    </script>
</body>
</html>
